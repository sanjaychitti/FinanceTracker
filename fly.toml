# Fly.io configuration for Finance Tracker
# IMPORTANT: Replace "finance-tracker-YOUR-NAME" with the unique app name
# you create in Step 2 of the deployment guide.

app = "finance-tracker-YOUR-NAME"
primary_region = "iad"

[build]

[env]
  NODE_ENV = "production"
  PORT = "8080"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

[[vm]]
  memory = "256mb"
  cpu_kind = "shared"
  cpus = 1

[[mounts]]
  source = "sqlite_data"
  destination = "/data"
